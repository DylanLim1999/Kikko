baseURL = "https://kikko.me/"
title = "Kikko"
languageCode = "zh-hans"
defaultContentLanguage = "zh-hans"
theme = "jant"
paginate = 50
enableRobotsTXT = true
disableKinds = ['taxonomy', 'term']

[permalinks]
  post = "/:slug/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["html", "rss"]
  section = ["html"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/atom+xml"
    baseName = "index"
    isPlainText = true
    rel = "alternate"

[mediaTypes]
  [mediaTypes."application/atom+xml"]
    suffixes = ["xml"]

[params]
  description = ""
  home_default_view = "latest"
  main_rss_feed = "featured"
  show_jant_branding_on_home = false
  show_header_avatar = true
  noindex = false
  theme_id = "sage"
  default_theme_id = "tufte"
  font_theme_id = "classic"
  theme_mode = "auto"
  page_size = 50
  archive_page_size = 50
  rss_feed_limit = 50
  site_avatar_url = "/media/sit_01krkkg18mextseza0sh9c6j3k/assets/avatar/med_01krknc4byfk2sndsdh8gm8c5c.svg"
  favicon_version = "202605141633"
